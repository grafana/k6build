name: CI
on:
  # Enable manually triggering this workflow via the API or web UI
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - v*
  pull_request:

permissions:
  contents: read

jobs:
  checks:
    # Matches the permissions the reusable workflow declares for itself, so it
    # keeps working if the org default GITHUB_TOKEN is restricted to read-only.
    permissions:
      contents: read
    uses: grafana/k6-ci/.github/workflows/all.yml@40fe52dff5492c8cb31ceda540d63877822d33a5 # main
    with:
      skip-extension-testing: true
